<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Hyper-Inference Router — AMD Hackathon Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0a0a0c; color: #e5e5e8; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    max-width: 720px; width: 100%; background: #14141a; border: 1px solid #26262e;
    border-radius: 16px; padding: 32px;
  }
  h1 { font-size: 1.5rem; margin: 0 0 4px; }
  .subtitle { color: #9a9aa5; font-size: 0.9rem; margin-bottom: 24px; }
  label { display: block; font-size: 0.85rem; color: #b5b5bd; margin: 16px 0 6px; }
  textarea, select {
    width: 100%; background: #1c1c24; border: 1px solid #33333d; border-radius: 8px;
    color: #e5e5e8; padding: 10px 12px; font-size: 0.95rem; font-family: inherit;
  }
  textarea { min-height: 100px; resize: vertical; }
  button {
    margin-top: 20px; width: 100%; padding: 12px; border-radius: 8px; border: none;
    background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; font-weight: 600;
    font-size: 0.95rem; cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .result { margin-top: 24px; padding: 16px; background: #1c1c24; border-radius: 10px;
    border: 1px solid #33333d; display: none; }
  .result.show { display: block; }
  .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 0.75rem;
    background: rgba(6,182,212,0.15); color: #22d3ee; border: 1px solid rgba(6,182,212,0.3); margin-bottom: 10px; }
  .meta { display: flex; gap: 16px; font-size: 0.8rem; color: #9a9aa5; margin-top: 10px; flex-wrap: wrap; }
  .output { white-space: pre-wrap; line-height: 1.5; margin-top: 8px; }
  .error { color: #f87171; }
</style>
</head>
<body>
  <div class="card">
    <h1>Hyper-Inference Router</h1>
    <div class="subtitle">Cost-aware routing across AMD MI300X models via Fireworks AI — featuring Gemma 4 26B A4B IT</div>

    <label for="taskHint">Task type</label>
    <select id="taskHint">
      <option value="">Auto-detect</option>
      <option value="reasoning">Reasoning (routes to Gemma 4)</option>
      <option value="creative">Creative (routes to Gemma 4)</option>
      <option value="casual">Casual (fast/cheap model)</option>
      <option value="code">Code (code-specialized model)</option>
    </select>

    <label for="prompt">Prompt</label>
    <textarea id="prompt" placeholder="e.g. Write a proposal for a full-stack developer role on a healthcare AI platform...">Write a short, professional freelance proposal for a Python developer role building a healthcare API platform with Flask and PostgreSQL.</textarea>

    <button id="submitBtn" onclick="route()">Route Request</button>

    <div class="result" id="result">
      <div class="badge" id="modelBadge"></div>
      <div class="output" id="output"></div>
      <div class="meta" id="meta"></div>
    </div>
  </div>

<script>
async function route() {
  const btn = document.getElementById('submitBtn');
  const resultEl = document.getElementById('result');
  const prompt = document.getElementById('prompt').value;
  const taskHint = document.getElementById('taskHint').value;

  btn.disabled = true;
  btn.textContent = 'Routing...';
  resultEl.classList.remove('show');

  try {
    const res = await fetch('/api/route', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, task_hint: taskHint || null }),
    });
    const data = await res.json();

    if (!res.ok) {
      document.getElementById('modelBadge').textContent = 'Error';
      document.getElementById('output').innerHTML = `<span class="error">${data.detail || 'Request failed'}</span>`;
      document.getElementById('meta').textContent = '';
    } else {
      document.getElementById('modelBadge').textContent = data.model_display;
      document.getElementById('output').textContent = data.text;
      const savingsText = data.savings_vs_gpt4_pct > 0
        ? ` · ${data.savings_vs_gpt4_pct}% cheaper than GPT-4o`
        : '';
      document.getElementById('meta').textContent =
        `Task: ${data.task_type} · Latency: ${data.latency_ms}ms · Tokens: ${data.tokens_used} · Cost: $${data.cost_usd}${savingsText}`;
    }
    resultEl.classList.add('show');
  } catch (e) {
    alert('Request failed: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Route Request';
  }
}
</script>
</body>
</html>
